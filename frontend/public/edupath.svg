    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="40" height="40" rx="9" fill="url(#bg)"/>
  <rect width="40" height="40" rx="9" fill="url(#glow)"/>
  <rect width="39" height="39" x="0.5" y="0.5" rx="8.5" stroke="white" stroke-opacity="0.12"/>

  <!-- Left page -->
  <path d="M20 11.5 C17 10.5 12.5 11 9.5 12.5 L9.5 27.5 C12.5 26 17 25.5 20 26.5 Z" fill="white" fill-opacity="0.95"/>

