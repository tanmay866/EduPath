  <path d="M20 11.5 C23 10.5 27.5 11 30.5 12.5 L30.5 27.5 C27.5 26 23 25.5 20 26.5 Z" fill="white" fill-opacity="0.55"/>

  <!-- Spine -->
  <line x1="20" y1="11" x2="20" y2="27.5" stroke="white" stroke-width="1.3" stroke-linecap="round"/>

  <!-- Left page lines -->
  <line x1="12" y1="17" x2="18.2" y2="16.2" stroke="white" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="20" x2="18.2" y2="19.3" stroke="white" stroke-opacity="0.35" stroke-width="1" stroke-linecap="round"/>
  <line x1="12" y1="23" x2="17" y2="22.4" stroke="white" stroke-opacity="0.25" stroke-width="1" stroke-linecap="round"/>

  <!-- Arrow stem -->
